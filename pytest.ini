[pytest]
# Default command line arguments
# Directory where tests are located
testpaths = tests
# Custom markers for categorizing tests (e.g., @pytest.mark.smoke)
markers =
    smoke: vital tests that must pass before any further testing
    regression: full suite of tests to ensure existing features work
    slow: tests that take a longer time to execute
# Minimum pytest version required
minversion = 6.0
